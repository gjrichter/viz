<!DOCTYPE html>
<html>
  
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="ixmaps embed example">
	<meta name="author" content="guenter richter">
	<link rel="shortcut icon" href="https://gjrichter.github.io/ixmaps/ui/resources/images/ixmaps_logo.png">
 
	<title>Created by Composer</title>
</head>
 
<body style="margin:0;padding:0;">
 
	<!-- here goes the map -->
	<div id="map-div"></div>
 
	<!-- include the ixmaps API -->
	<script src="https://cdn.jsdelivr.net/gh/gjrichter/ixmaps-flat@master/ixmaps.js"></script>
 
	<script type="text/javascript" charset="utf-8">
 
		// create and embed the map
		// ! reference to "map-div", the hosting html div

		ixmaps.Map("map-div", {
			mapService: "leaflet_vt",
			mapType: "VT_TOPO_TOPOGRAPHIQUE",
			map: "../../maps/svg/maps/generic/mercator.svg",
			name: "map_1",
			mode: "pan",
			legend: "true",
			tools: "true",
			search: "Europe",
			about: "test"
		},
		map => map
		.options({
			featurescaling: "true",
			objectscaling: "true",
			normalSizeScale: "20000000",
			flushChartDraw: "1000000",
			flushPaintShape: "1000000",
			basemapopacity: "0.5",
			worksilent: "false",
			loadsilent: "false",
			hideOnPan:  "false",
			freezeOnPan:"false",
		})
		.attribution("")
		.view({
			"center": {
				"lat": 38.0392912486577,
				"lng": 13.547822239236678
			},
			"zoom": 18.444478684519435
		})
		.layer(ixmaps.layer("comune_082004_qc", layer => layer
			.data({
				"url": "https://s3.fr-par.scw.cloud/ixmaps.data/projects/comune_082004_qc.geojson",
				"type": "geojson",
				"name": "data_1775120699097",
				"cache": "true"
			})
			.binding({
				"geo": "geometry",
				"value": "$item$"
			})
			.type("CHART|DOT|RAW")
			.style({
				"colorscheme": [
					1,
					"#0000dd",
					"#0000dd"
				],
				"fillopacity": 0.8,
				"shadow": false,
				"visible": true,
				"showdata": true,
				"units": "",
				"scale": 1,
				"sizepow": 2,
				"valuescale": 1
			})
			.meta({
				"title": "comune_082004_qc",
				"snippet": "",
				"description": "geocoded by Mapbox",
				"name": "comune_082004_qc",
				"tooltip": "{{theme.item.chart}}{{theme.item.data}}"
			})
		))
		.layer(ixmaps.layer("comune_082004", layer => layer
			.data({
				"url": "https://s3.fr-par.scw.cloud/ixmaps.data/projects/comune_082004.geojson",
				"type": "geojson",
				"name": "data_1775121167095",
				"cache": "true"
			})
			.binding({
				"geo": "geometry",
				"value": "$item$"
			})
			.type("CHART|DOT|RAW")
			.style({
				"colorscheme": [
					1,
					"#dd0000",
					"#dd0000"
				],
				"fillopacity": 0.5,
				"shadow": false,
				"visible": true,
				"showdata": true,
				"units": "",
				"scale": 1,
				"sizepow": 2,
				"valuescale": 1
			})
			.meta({
				"title": "comune_082004",
				"snippet": "",
				"description": "ANNCSU data",
				"name": "comune_082004",
				"tooltip": "{{theme.item.chart}}{{theme.item.data}}"
			})
		))
	);
	</script>
</body>
</html>
