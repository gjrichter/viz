
<style>
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scaleX(1); }
    40% { transform: translateY(-38px) scaleX(0.85); }
    60% { transform: translateY(-42px) scaleX(0.85); }
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }
  @keyframes run {
    0% { left: -80px; }
    100% { left: calc(100% + 80px); }
  }
  @keyframes shadow-pulse {
    0%, 100% { transform: scaleX(1); opacity: 0.35; }
    50% { transform: scaleX(0.5); opacity: 0.15; }
  }
  @keyframes transform-in {
    0% { opacity: 0; transform: scale(0.2) rotate(-30deg); }
    60% { transform: scale(1.2) rotate(8deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes street-scroll {
    0% { background-position: 0 0; }
    100% { background-position: -400px 0; }
  }
  @keyframes eye-blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  @keyframes moon-glow {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  @keyframes rain {
    0% { top: -20px; }
    100% { top: 100%; }
  }
  .gremlin-wrap {
    position: absolute;
    bottom: 62px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: run linear infinite, bounce ease-in-out infinite;
  }
  .shadow {
    width: 36px;
    height: 8px;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
    margin-top: 2px;
    animation: shadow-pulse ease-in-out infinite;
  }
</style>

<script>
const scene = document.getElementById('scene');
const gremlinsContainer = document.getElementById('gremlins');
const starsEl = document.getElementById('stars');
const rainEl = document.getElementById('rain');

// Stars
for (let i = 0; i < 55; i++) {
  const s = document.createElement('div');
  const size = Math.random() * 2 + 1;
  s.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:#fff;border-radius:50%;top:${Math.random()*50}%;left:${Math.random()*100}%;opacity:${0.4+Math.random()*0.6}`;
  starsEl.appendChild(s);
}

// Rain
for (let i = 0; i < 30; i++) {
  const r = document.createElement('div');
  const dur = 0.6 + Math.random() * 0.8;
  r.style.cssText = `position:absolute;width:1px;height:${8+Math.random()*10}px;background:rgba(180,200,255,0.35);left:${Math.random()*100}%;top:-20px;animation:rain ${dur}s linear ${Math.random()*2}s infinite;`;
  rainEl.appendChild(r);
}

// Gremlin data: numero civico + colore
const gremlinsData = [
  { num: '7',  color: '#4de88a', accent: '#0a4a1a', delay: 0,    dur: 4.2,  bounceDur: 0.55, size: 34 },
  { num: '13', color: '#e84d4d', accent: '#5a0808', delay: 1.1,  dur: 5.8,  bounceDur: 0.48, size: 38 },
  { num: '24', color: '#c94df0', accent: '#3a0a5a', delay: 2.3,  dur: 3.6,  bounceDur: 0.62, size: 30 },
  { num: '3',  color: '#4db8e8', accent: '#0a2a40', delay: 0.7,  dur: 6.1,  bounceDur: 0.42, size: 42 },
  { num: '99', color: '#f0a04d', accent: '#5a2a00', delay: 1.8,  dur: 4.8,  bounceDur: 0.52, size: 36 },
  { num: '11', color: '#e8e84d', accent: '#4a4a00', delay: 3.0,  dur: 5.2,  bounceDur: 0.58, size: 32 },
  { num: '42', color: '#4de8b8', accent: '#003a28', delay: 0.3,  dur: 4.0,  bounceDur: 0.65, size: 40 },
  { num: '66', color: '#e84da0', accent: '#5a0030', delay: 2.6,  dur: 6.5,  bounceDur: 0.44, size: 35 },
];

function makeFace(g, size) {
  // SVG gremlin face
  const hw = size;
  const hh = size;
  const svg = `<svg width="${hw}" height="${hh+10}" viewBox="0 0 ${hw} ${hh+14}" xmlns="http://www.w3.org/2000/svg">
    <!-- ears -->
    <ellipse cx="5" cy="${hh*0.4}" rx="7" ry="9" fill="${g.color}"/>
    <ellipse cx="${hw-5}" cy="${hh*0.4}" rx="7" ry="9" fill="${g.color}"/>
    <ellipse cx="5" cy="${hh*0.4}" rx="3" ry="5" fill="${g.accent}" opacity="0.6"/>
    <ellipse cx="${hw-5}" cy="${hh*0.4}" rx="3" ry="5" fill="${g.accent}" opacity="0.6"/>
    <!-- horns -->
    <polygon points="${hw*0.3},2 ${hw*0.25},${hh*0.2} ${hw*0.38},${hh*0.18}" fill="${g.accent}"/>
    <polygon points="${hw*0.7},2 ${hw*0.62},${hh*0.18} ${hw*0.75},${hh*0.2}" fill="${g.accent}"/>
    <!-- head -->
    <ellipse cx="${hw/2}" cy="${hh*0.52}" rx="${hw*0.42}" ry="${hh*0.46}" fill="${g.color}"/>
    <!-- number embedded like targa civica -->
    <rect x="${hw*0.2}" y="${hh*0.28}" width="${hw*0.6}" height="${hh*0.3}" rx="3" fill="#fffbea" stroke="#c8a820" stroke-width="1.2"/>
    <text x="${hw/2}" y="${hh*0.49}" text-anchor="middle" dominant-baseline="middle" font-size="${g.num.length>2?10:13}" font-weight="700" fill="#7a4800" font-family="serif">${g.num}</text>
    <!-- eyes -->
    <ellipse cx="${hw*0.35}" cy="${hh*0.62}" rx="5.5" ry="5" fill="#fff" style="animation:eye-blink 3s ease-in-out infinite;transform-origin:${hw*0.35}px ${hh*0.62}px"/>
    <ellipse cx="${hw*0.65}" cy="${hh*0.62}" rx="5.5" ry="5" fill="#fff" style="animation:eye-blink 3s ease-in-out 0.15s infinite;transform-origin:${hw*0.65}px ${hh*0.62}px"/>
    <circle cx="${hw*0.35}" cy="${hh*0.62}" r="3" fill="${g.accent}"/>
    <circle cx="${hw*0.65}" cy="${hh*0.62}" r="3" fill="${g.accent}"/>
    <circle cx="${hw*0.37}" cy="${hh*0.60}" r="1" fill="#fff"/>
    <circle cx="${hw*0.67}" cy="${hh*0.60}" r="1" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="${hw/2}" cy="${hh*0.72}" rx="4" ry="3" fill="${g.accent}" opacity="0.7"/>
    <circle cx="${hw*0.43}" cy="${hh*0.72}" r="1.2" fill="#fff" opacity="0.5"/>
    <circle cx="${hw*0.57}" cy="${hh*0.72}" r="1.2" fill="#fff" opacity="0.5"/>
    <!-- mouth grinning -->
    <path d="M${hw*0.3} ${hh*0.82} Q${hw/2} ${hh*0.94} ${hw*0.7} ${hh*0.82}" fill="none" stroke="${g.accent}" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="${hw*0.38}" y1="${hh*0.86}" x2="${hw*0.36}" y2="${hh*0.92}" stroke="${g.accent}" stroke-width="1"/>
    <line x1="${hw*0.5}" y1="${hh*0.88}" x2="${hw*0.5}" y2="${hh*0.95}" stroke="${g.accent}" stroke-width="1"/>
    <line x1="${hw*0.62}" y1="${hh*0.86}" x2="${hw*0.64}" y2="${hh*0.92}" stroke="${g.accent}" stroke-width="1"/>
    <!-- tiny legs -->
    <line x1="${hw*0.38}" y1="${hh*0.94}" x2="${hw*0.30}" y2="${hh+8}" stroke="${g.color}" stroke-width="4" stroke-linecap="round"/>
    <line x1="${hw*0.62}" y1="${hh*0.94}" x2="${hw*0.70}" y2="${hh+8}" stroke="${g.color}" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="${hw*0.28}" cy="${hh+10}" rx="5" ry="3" fill="${g.color}"/>
    <ellipse cx="${hw*0.72}" cy="${hh+10}" rx="5" ry="3" fill="${g.color}"/>
  </svg>`;
  return svg;
}

gremlinsData.forEach((g) => {
  const wrap = document.createElement('div');
  wrap.className = 'gremlin-wrap';
  wrap.style.animationDuration = `${g.dur}s, ${g.bounceDur}s`;
  wrap.style.animationDelay = `${g.delay}s, ${g.delay}s`;
  wrap.style.animationTimingFunction = 'linear, ease-in-out';
  wrap.style.animationIterationCount = 'infinite, infinite';
  wrap.style.animationName = 'run, bounce';

  const face = document.createElement('div');
  face.innerHTML = makeFace(g, g.size);
  face.style.cssText = `animation: wobble ${g.bounceDur * 1.2}s ease-in-out ${g.delay}s infinite;`;

  // small name label: "Civico n.X"
  const label = document.createElement('div');
  label.textContent = `civico ${g.num}`;
  label.style.cssText = `font-size:9px;color:#ffe87a99;margin-top:1px;white-space:nowrap;`;

  const shadow = document.createElement('div');
  shadow.className = 'shadow';
  shadow.style.animationDuration = `${g.bounceDur}s`;
  shadow.style.animationDelay = `${g.delay}s`;

  wrap.appendChild(face);
  wrap.appendChild(shadow);
  wrap.appendChild(label);
  gremlinsContainer.appendChild(wrap);
});
</script>
