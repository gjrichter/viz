<!DOCTYPE html>
<html>
  
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="ixmaps embed example">
	<meta name="author" content="guenter richter">
	<link rel="shortcut icon" href="https://gjrichter.github.io/ixmaps/ui/resources/images/ixmaps_logo.png">
 
	<title>Created by Composer</title>

    <style>
        html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8e8e8; }
        #map { width: 100%; height: 100%; }

        #header {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(20,20,20,0.88) 0%, rgba(30,30,30,0.88) 100%);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            height: 56px;
            box-sizing: border-box;
        }
        #header h1 { color: #f0f0f0; font-size: 1.05rem; font-weight: 600; white-space: nowrap; margin: 0; }
        #header p  { color: rgba(220,220,220,0.55); font-size: 0.72rem; margin: 2px 0 0; }

        #app-loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(255,255,255,0.97);
            border-radius: 12px;
            padding: 24px 36px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #d0eaea;
            border-top-color: #00838f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        #app-loading p { color: #555; font-size: 0.88rem; margin: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #legend {
            position: absolute;
            bottom: 30px; left: 14px;
            z-index: 1000;
            background: rgba(20,20,20,0.88);
            border-radius: 10px;
            padding: 11px 14px;
            color: #e8e8e8;
            font-size: 0.72rem;
            box-shadow: 0 2px 14px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            display: none;
            min-width: 205px;
            line-height: 1.7;
        }
        #legend b { display: block; font-size: 0.8rem; margin-bottom: 6px; color: #fff; }
        .leg-row { display: flex; align-items: center; gap: 8px; }
        .leg-bar  { height: 6px; border-radius: 3px; flex: 1; }
        .leg-sep  { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 6px 0; }

        #stats {
            position: absolute;
            bottom: 30px; right: 14px;
            z-index: 1000;
            background: rgba(20,20,20,0.88);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.75rem;
            box-shadow: 0 2px 14px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08);
            line-height: 1.9;
            min-width: 185px;
            display: none;
        }
        #stats b { display: block; font-size: 0.8rem; color: #fff; margin-bottom: 4px; }
        .stat-row { display: flex; justify-content: space-between; gap: 12px; color: #bbb; }
        .si-val  { color: #5ac8c8; font-weight: 700; }
        .no-val  { color: #e07070; font-weight: 700; }
        .neu-val { color: #ccc;    font-weight: 700; }
        .stat-sep { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 5px 0; }

        #vot-filter {
            position: absolute;
            top: 66px; left: 14px;
            z-index: 1000;
            background: rgba(255,255,255,0.88);
            border-radius: 10px;
            padding: 10px 14px;
            color: #333;
            font-size: 0.72rem;
            border: 1px solid rgba(0,0,0,0.08);
            min-width: 190px;
        }
        #vot-filter b { display: block; font-size: 0.78rem; color: #222; margin-bottom: 5px; }
        .vot-vals { color: #555; font-size: 0.70rem; margin-bottom: 6px; text-align: center; }
        .vot-vals span { color: #5ac8c8; font-weight: 700; }

        .range-wrap {
            position: relative;
            height: 22px;
        }
        .range-track {
            position: absolute;
            top: 9px; left: 7px; right: 7px;
            height: 4px;
            background: rgba(0,0,0,0.12);
            border-radius: 2px;
        }
        .range-fill {
            position: absolute;
            left: 0%; width: 100%;
            height: 100%;
            background: #5ac8c8;
            border-radius: 2px;
        }
        .range-wrap input[type=range] {
            position: absolute;
            top: 0; width: 100%; height: 22px;
            background: transparent;
            pointer-events: none;
            -webkit-appearance: none;
            appearance: none;
            margin: 0; outline: none;
        }
        .range-wrap input[type=range]::-webkit-slider-thumb {
            pointer-events: all;
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #5ac8c8;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
        .range-wrap input[type=range]::-moz-range-thumb {
            pointer-events: all;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #5ac8c8;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
    </style>

</head>
 
<body style="margin:0;padding:0;">
 
	<!-- container 1024px: mappa + slider sibling, fuori dal ciclo ixmaps -->
	<div style="position:relative; max-width:1024px; margin:auto; height:100%;">
        <div id="map"></div>
        <div id="vot-filter">
            <b>Affluenza</b>
            <div class="vot-vals"><span id="vot-min-val">0</span>% &ndash; <span id="vot-max-val">100</span>%</div>
            <div class="range-wrap">
                <div class="range-track"><div class="range-fill" id="range-fill"></div></div>
                <input type="range" id="vot-min" min="0" max="100" value="0"   step="1">
                <input type="range" id="vot-max" min="0" max="100" value="100" step="1">
            </div>
        </div>
    </div>
 
	<!-- include the ixmaps API -->
	<script src="https://cdn.jsdelivr.net/gh/gjrichter/ixmaps-flat@master/ixmaps.js"></script>
 
	<script type="text/javascript" charset="utf-8">
 
 	const TOPO_URL      = "https://raw.githubusercontent.com/gjrichter/geo/main/italy/boundaries/italy_istat_municipalities_4326_500m.topojson";
	const DATA_URL      = "https://raw.githubusercontent.com/ondata/referendum-download/main/data/20260322/scrutini_flat.csv";
  // Divergente simmetrico 4+4 — nessun centro neutro
  // 4 rossi (scuro→chiaro) · 4 teal (chiaro→scuro), taglio netto a 50%
  const COLORS = [
      "#8b1a1a", "#c04040", "#e07070", "#f0a8a8",
      "#a0d8d8", "#5ac8c8", "#1a9696", "#005858"
  ];

	// create and embed the map
	// ! reference to "map-div", the hosting html div

	var myMap = ixmaps.Map("map", {
        mapType: "VT_BASIC_LIGHT",
        mode:    "map",
        legend:  "open",
        tools:   true
    })
    .view({ center: { lat: 42.5, lng: 12.5 }, zoom: 6 })
    .options({
        objectscaling:   "dynamic",
        normalSizeScale: "10000000",
        basemapopacity:  1,
        flushChartDraw:  1000000,
        flushPaintShape: 1000000,
		dynamiclabel: "false",
		labelspace: "1.0",
		checklabeloverlap: "NOKILL",

    })
    // ── Layer 0: contorni italia (polygon) ──────────────────────────────
    myMap.layer("italia")
		.type("FEATURES|SILENT|LOCKED|NOLEGEND")
		.data({
			url: "https://gisco-services.ec.europa.eu/distribution/v2/nuts/geojson/NUTS_RG_10M_2021_4326_LEVL_2.geojson",
			type: "geojson"
		})
		.binding({
			id: "NUTS_ID"
		})
		.filter("WHERE CNTR_CODE = IT")
		.style({
			colorscheme: [
				"#f8f8f8"
			],
			fillopacity: "1",
			linecolor: "#F7F6EF",
			linewidth: "2",
			shadow: true,
			showdata: true,
			featurelower: "1:2000000",
			titlefield: "NUTS_NAME",
			name: "nuts2"
		})
        .define();

    // ── Layer 1: contorni comunali (polygon) ──────────────────────────────
    myMap.layer("comuni")
        .data({ url: TOPO_URL, type: "topojson" })
        .binding({ geo: "geometry", id: "com_istat_code", title: "name" })
        .type("FEATURE")
        .style({
            colorscheme: ["none"],
            fillopacity: 0,
            linecolor:   "none",
            linewidth:   0.2,
            showdata:    "true"
        })
        .define();

    // ── Layer 2: sfondo divergente % No ───────────────────────────────────
    myMap.layer("comuni")
        .data({ url: DATA_URL, type: "csv" })
        .binding({ lookup: "cod_istat", value: "perc_si", title: "desc_com" })
        .type("CHOROPLETH")
        .style({
            colorscheme:      COLORS,
            ranges:           [0, 20, 30, 40, 50, 60, 70, 80, 100],
            rangecentervalue: "50",
            fillopacity:      0.72,
            linecolor:        "#707070",
            linewidth:        0.2,
            showdata:         "true"
        })
        .meta({
            name: "choropleth_theme",
            tooltip: [
                '<b style="font-size:1.05em;color:#0a3d3d">{{desc_com}}</b>',
                '<br><span style="color:#7f8c8d;font-size:0.88em">{{desc_prov}} &middot; {{desc_reg}}</span>',
                '<hr style="border:none;border-top:1px solid #eee;margin:5px 0">',
                '<table>',
                '<tr><td style="color:#888;padding:2px 4px">Sì</td>',
                '    <td style="font-weight:600;padding:2px 4px;color:#008888">{{perc_si}}%</td>',
                '    <td style="color:#aaa;padding:2px 4px;font-size:0.85em">({{voti_si}} voti)</td></tr>',
                '<tr><td style="color:#888;padding:2px 4px">No</td>',
                '    <td style="font-weight:600;padding:2px 4px;color:#c0392b">{{perc_no}}%</td>',
                '    <td style="color:#aaa;padding:2px 4px;font-size:0.85em">({{voti_no}} voti)</td></tr>',
                '<tr><td style="color:#888;padding:2px 4px">Affluenza</td>',
                '    <td style="font-weight:600;padding:2px 4px">{{perc_vot}}%</td>',
                '    <td style="color:#aaa;padding:2px 4px;font-size:0.85em">({{votanti_t}} / {{elettori_t}})</td></tr>',
                '</table>'
            ].join("")
        })
        .title("% Si referendum 22/03/2026")
        .define();

	// ── Zoom dynamics ───────────────────────────────
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
	function opacityForZoom(zoom, startZoom, endZoom, startOpacity, endOpacity) {
      const t = clamp((zoom - startZoom) / (endZoom - startZoom), 0, 1);
      return startOpacity + (endOpacity - startOpacity) * t;
    }

    function applyZoomStyles() {
      const mapApi = (typeof ixmaps.map === "function") ? ixmaps.map() : null;
      const zoom = mapApi && typeof mapApi.getZoom === "function" ? mapApi.getZoom() : 6;
      const baseOpacity = opacityForZoom(zoom, 7, 11, 0, 0.92);
      const fillOpacity = opacityForZoom(zoom, 5, 12, 0.92, 0.42);

      if (typeof myMap.options === "function") {
        myMap.options({
          basemapopacity: baseOpacity
        });
      }

      if (mapApi && typeof mapApi.changeThemeStyle === "function") {
        mapApi.changeThemeStyle("choropleth_theme", "fillopacity:" + fillOpacity.toFixed(3), "set");
      } else if (typeof ixmaps.changeThemeStyle === "function") {
        ixmaps.changeThemeStyle("choropleth_theme", "fillopacity:" + fillOpacity.toFixed(3), "set");
      }
    }

    function bindZoomStyles() {
      const mapApi = (typeof ixmaps.map === "function") ? ixmaps.map() : null;
      if (mapApi && typeof mapApi.on === "function") {
        mapApi.on("zoomend moveend", function() {
          applyZoomStyles();
        });
      } else {
        setTimeout(bindZoomStyles, 250);
        return;
      }
      applyZoomStyles();
    }

    bindZoomStyles();

	// ── Affluenza range slider ───────────────────────────────────────────
    function updateRangeFill() {
        var minV = parseInt(document.getElementById('vot-min').value);
        var maxV = parseInt(document.getElementById('vot-max').value);
        var fill = document.getElementById('range-fill');
        fill.style.left  = minV + '%';
        fill.style.width = (maxV - minV) + '%';
        document.getElementById('vot-min-val').textContent = minV;
        document.getElementById('vot-max-val').textContent = maxV;
    }

    function applyVotFilter() {
        var minV = parseInt(document.getElementById('vot-min').value);
        var maxV = parseInt(document.getElementById('vot-max').value);
        updateRangeFill();
        myMap.then(function(map) {
            if (minV === 0 && maxV === 100) {
                map.changeThemeStyle("choropleth_theme", "filter", "remove");
            } else {
                map.changeThemeStyle("choropleth_theme",
                    "filter:WHERE perc_vot >= " + minV + " AND perc_vot <= " + maxV, "set");
            }
        });
    }

    document.getElementById('vot-min').addEventListener('input', function() {
        var maxV = parseInt(document.getElementById('vot-max').value);
        if (parseInt(this.value) >= maxV) this.value = maxV - 1;
        applyVotFilter();
    });

    document.getElementById('vot-max').addEventListener('input', function() {
        var minV = parseInt(document.getElementById('vot-min').value);
        if (parseInt(this.value) <= minV) this.value = minV + 1;
        applyVotFilter();
    });

    updateRangeFill();
	</script>
</body>
</html>
